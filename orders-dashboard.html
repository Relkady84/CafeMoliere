<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Molière — Orders Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1A1A1A; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .dash-header { background: #FF5E00; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .dash-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #fff; font-weight: 400; }
  .dash-title em { font-style: italic; }
  .dash-live { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #FCECBB; letter-spacing: 0.08em; text-transform: uppercase; }
  .live-dot { width: 8px; height: 8px; background: #FCECBB; border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)} }
  .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: #111; border-bottom: 1px solid #333; }
  .stat { background: #222; padding: 14px 12px; text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: #FF5E00; line-height: 1; }
  .stat-label { font-size: 10px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .columns { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; padding: 16px; min-height: calc(100vh - 130px); align-items: start; }
  @media(max-width:700px){ .columns{grid-template-columns:1fr} }
  .col-title { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .col-badge { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
  .col-new .col-title{color:#FF5E00} .col-new .col-badge{background:#FF5E00;color:#fff}
  .col-prep .col-title{color:#F5A623} .col-prep .col-badge{background:#F5A623;color:#fff}
  .col-ready .col-title{color:#4CAF50} .col-ready .col-badge{background:#4CAF50;color:#fff}
  .order-card { background: #2A2A2A; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid #333; transition: transform 0.2s,box-shadow 0.2s; animation: slideIn 0.35s ease forwards; }
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .order-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4)}
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-name { font-weight: 600; font-size: 0.95rem; color: #FCECBB; }
  .order-address { font-size: 11px; color: #888; margin-top: 2px; }
  .order-time { font-size: 10px; color: #666; white-space: nowrap; background: #333; padding: 3px 7px; border-radius: 20px; }
  .order-items { border-top: 1px solid #333; padding-top: 8px; margin-bottom: 10px; }
  .order-item { display: flex; justify-content: space-between; font-size: 12px; color: #ccc; padding: 3px 0; }
  .order-item span:last-child{color:#888}
  .order-total { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #FCECBB; border-top: 1px solid #444; padding-top: 6px; margin-bottom: 10px; }
  .order-actions{display:flex;gap:6px}
  .btn-action { flex: 1; padding: 8px; border: none; border-radius: 8px; font-family: 'DM Sans',sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: opacity 0.15s,transform 0.15s; }
  .btn-action:hover{opacity:0.85;transform:translateY(-1px)}
  .btn-next{background:#F5A623;color:#fff}
  .btn-next.to-ready{background:#4CAF50}
  .btn-next.done{background:#555;color:#aaa}
  .btn-delete{background:#333;color:#888;flex:0 0 36px}
  .empty-col{text-align:center;padding:40px 20px;color:#444;font-size:13px}
  .empty-col div{font-size:2rem;margin-bottom:8px}
  .notif{position:fixed;top:70px;right:20px;background:#FF5E00;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(255,94,0,0.4);z-index:999;animation:notifIn 0.3s ease;max-width:260px}
  @keyframes notifIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .conn-status{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:0.05em}
  .conn-status.connected{background:rgba(76,175,80,0.2);color:#4CAF50}
  .conn-status.disconnected{background:rgba(255,94,0,0.2);color:#FF5E00}
</style>
</head>
<body>

<div class="dash-header">
  <div class="dash-title">Café <em>Molière</em> — Orders</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="conn-status disconnected" id="conn-status">● Connecting...</span>
    <div class="dash-live"><div class="live-dot"></div> Live</div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="stat-new">0</div><div class="stat-label">New</div></div>
  <div class="stat"><div class="stat-num" id="stat-prep">0</div><div class="stat-label">Preparing</div></div>
  <div class="stat"><div class="stat-num" id="stat-ready">0</div><div class="stat-label">Ready</div></div>
</div>

<div class="columns">
  <div class="col-new">
    <div class="col-title">🆕 New <div class="col-badge" id="badge-new">0</div></div>
    <div id="col-new-items"></div>
  </div>
  <div class="col-prep">
    <div class="col-title">🍳 Preparing <div class="col-badge" id="badge-prep">0</div></div>
    <div id="col-prep-items"></div>
  </div>
  <div class="col-ready">
    <div class="col-title">✅ Ready <div class="col-badge" id="badge-ready">0</div></div>
    <div id="col-ready-items"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// REPLACE these values with your Firebase project config
const firebaseConfig = {
  apiKey:        "AIzaSyANahV1JOHQqEweg6e8i_LvltXNCTW-kIw",
  authDomain:    "cafe-moliere.firebaseapp.com",
  projectId:     "cafe-moliere",
};
// ─────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let orders = {};
let firstLoad = true;

function formatLL(n){ return 'LL ' + Number(n).toLocaleString(); }

async function moveOrder(id, toStatus){
  await db.collection('orders').doc(id).update({ status: toStatus });
}

async function deleteOrder(id){
  await db.collection('orders').doc(id).delete();
}

function renderCard(id, o){
  const isNew  = o.status === 'new';
  const isPrep = o.status === 'preparing';
  const nextLabel  = isNew ? '→ Preparing' : isPrep ? '→ Ready' : '✓ Clear';
  const nextStatus = isNew ? 'preparing'   : isPrep ? 'ready'   : null;
  const btnClass   = isNew ? 'btn-next'    : isPrep ? 'btn-next to-ready' : 'btn-next done';
  return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-name">${o.name}</div>
          <div class="order-address">${o.address}</div>
        </div>
        <div class="order-time">${o.time}</div>
      </div>
      <div class="order-items">
        ${(o.items||[]).map(i=>`
          <div class="order-item">
            <span>${i.name} x${i.qty}</span>
            <span>${formatLL(i.price)}</span>
          </div>`).join('')}
      </div>
      <div class="order-total"><span>Total</span><span>${formatLL(o.total)}</span></div>
      <div class="order-actions">
        <button class="${btnClass}" onclick="${nextStatus ? `moveOrder('${id}','${nextStatus}')` : `deleteOrder('${id}')`}">
          ${nextLabel}
        </button>
        <button class="btn-action btn-delete" onclick="deleteOrder('${id}')">🗑</button>
      </div>
    </div>`;
}

function renderEmpty(msg){
  return `<div class="empty-col"><div>—</div>${msg}</div>`;
}

function render(){
  const byStatus = { new:{}, preparing:{}, ready:{} };
  Object.entries(orders).forEach(([id,o])=>{ if(byStatus[o.status]) byStatus[o.status][id]=o; });
  const slots = [
    {status:'new',       col:'col-new-items',  badge:'badge-new',  stat:'stat-new',  msg:'No new orders'},
    {status:'preparing', col:'col-prep-items', badge:'badge-prep', stat:'stat-prep', msg:'Nothing cooking'},
    {status:'ready',     col:'col-ready-items',badge:'badge-ready',stat:'stat-ready',msg:'Nothing ready yet'},
  ];
  slots.forEach(({status,col,badge,stat,msg})=>{
    const entries = Object.entries(byStatus[status]);
    const count = entries.length;
    document.getElementById(badge).textContent = count;
    document.getElementById(stat).textContent  = count;
    document.getElementById(col).innerHTML = count
      ? entries.map(([id,o])=>renderCard(id,o)).join('')
      : renderEmpty(msg);
  });
}

function showNotif(name){
  const existing = document.querySelector('.notif');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = `New order from ${name}!`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

db.collection('orders').orderBy('createdAt','desc')
  .onSnapshot(snapshot=>{
    document.getElementById('conn-status').textContent = '● Connected';
    document.getElementById('conn-status').className   = 'conn-status connected';
    snapshot.docChanges().forEach(change=>{
      if(change.type==='added' && !firstLoad) showNotif(change.doc.data().name);
      if(change.type==='removed') delete orders[change.doc.id];
      else orders[change.doc.id] = change.doc.data();
    });
    firstLoad = false;
    render();
  }, err=>{
    document.getElementById('conn-status').textContent = '● Not connected';
    document.getElementById('conn-status').className   = 'conn-status disconnected';
  });
</script>
</body>
</html>
